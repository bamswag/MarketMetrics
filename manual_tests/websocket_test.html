<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MarketMetrics WS Test</title>
    <style>
      :root {
        --bg: #f4f1ea;
        --panel: #fffdf8;
        --ink: #1e1d1a;
        --muted: #6d6659;
        --accent: #0f766e;
        --accent-2: #d97706;
        --border: #d8d1c4;
      }
      body {
        font-family: ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        background: linear-gradient(180deg, #f8f5ee 0%, #efe9dc 100%);
        color: var(--ink);
        margin: 0;
        padding: 24px;
      }
      .wrap {
        max-width: 860px;
        margin: 0 auto;
      }
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(30, 29, 26, 0.08);
        margin-bottom: 16px;
      }
      h1, h3 {
        margin-top: 0;
      }
      p {
        color: var(--muted);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
        color: var(--muted);
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: white;
      }
      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        cursor: pointer;
        font-weight: 600;
      }
      .primary {
        background: var(--accent);
        color: white;
      }
      .secondary {
        background: #ece7db;
        color: var(--ink);
      }
      .status {
        color: var(--accent-2);
        min-height: 20px;
      }
      pre { white-space: pre-wrap; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>WebSocket Quote Stream Test</h1>
        <p>
          This page can log in, store your JWT in local storage, and open a quote stream without hard-coding a token in the file.
        </p>
        <div class="grid">
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="testuser@example.com" />
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" placeholder="password123" />
          </div>
          <div>
            <label for="symbol">Symbol</label>
            <input id="symbol" type="text" value="AAPL" />
          </div>
        </div>
        <div class="actions">
          <button class="primary" id="login">Login + Save Token</button>
          <button class="secondary" id="connect">Connect Stream</button>
          <button class="secondary" id="clear">Clear Token</button>
        </div>
        <p class="status" id="status"></p>
      </div>

      <div class="panel">
        <h3>Stream Output</h3>
        <pre id="out">No connection yet.</pre>
      </div>
    </div>

    <script>
  const out = document.getElementById("out");
  const statusEl = document.getElementById("status");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const symbolInput = document.getElementById("symbol");
  const loginBtn = document.getElementById("login");
  const connectBtn = document.getElementById("connect");
  const clearBtn = document.getElementById("clear");
  const TOKEN_KEY = "marketmetrics_ws_token";
  let ws = null;

  function setStatus(message) {
    statusEl.textContent = message;
  }

  function getToken() {
    return window.localStorage.getItem(TOKEN_KEY);
  }

  function saveToken(token) {
    window.localStorage.setItem(TOKEN_KEY, token);
  }

  async function login() {
    const email = emailInput.value.trim();
    const password = passwordInput.value;

    if (!email || !password) {
      setStatus("Enter an email and password first.");
      return;
    }

    setStatus("Logging in...");
    const body = new URLSearchParams({
      username: email,
      password,
    });

    const response = await fetch("http://127.0.0.1:8000/auth/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded",
      },
      body,
    });

    if (!response.ok) {
      const error = await response.text();
      setStatus(`Login failed: ${error}`);
      return;
    }

    const data = await response.json();
    saveToken(data.access_token);
    setStatus("Token saved locally.");
  }

  function connect() {
    const token = getToken();
    const symbol = symbolInput.value.trim().toUpperCase();

    if (!token) {
      setStatus("No token saved. Log in first.");
      return;
    }

    if (!symbol) {
      setStatus("Enter a stock symbol first.");
      return;
    }

    if (ws) {
      ws.close();
    }

    out.textContent = `Connecting to ${symbol}...\n`;
    setStatus("Opening WebSocket...");

    ws = new WebSocket(`ws://127.0.0.1:8000/ws/quotes/${symbol}?token=${encodeURIComponent(token)}`);

    ws.onopen = () => {
      out.textContent += "connected\n";
      setStatus(`Connected to ${symbol}.`);
    };
    ws.onmessage = (evt) => {
      out.textContent += evt.data + "\n";
    };
    ws.onclose = (evt) => {
      out.textContent += `closed (code=${evt.code}, reason=${evt.reason})\n`;
      setStatus("Connection closed.");
    };
    ws.onerror = () => {
      out.textContent += "error\n";
      setStatus("WebSocket error.");
    };
  }

  loginBtn.addEventListener("click", () => {
    login().catch((error) => {
      setStatus(`Login failed: ${error}`);
    });
  });

  connectBtn.addEventListener("click", connect);

  clearBtn.addEventListener("click", () => {
    window.localStorage.removeItem(TOKEN_KEY);
    setStatus("Saved token cleared.");
  });

  if (getToken()) {
    setStatus("Saved token found. You can connect immediately.");
  }
    </script>
  </body>
</html>
